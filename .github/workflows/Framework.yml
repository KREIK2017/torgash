name: .NET Framework Build and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2

    - name: Setup .NET Framework
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '8.0.0' # Встановіть відповідну версію .NET Framework

    - name: Restore dependencies
      run: nuget restore YourSolution.sln

    - name: Build with MSBuild
      run: msbuild /p:Configuration=Release /p:Platform="Any CPU" /p:DeployOnBuild=true /p:PublishProfile=FolderProfile

    - name: Publish Artifact
      uses: actions/upload-artifact@v2
      with:
        name: published-app
        path: ./path/to/your/published/app

  deploy:
    runs-on: windows-latest
    needs: build
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v2
      with:
        name: published-app

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: your-web-app-name
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./path/to/your/published/app
